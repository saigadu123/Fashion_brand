services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: ${BACKEND_IMAGE:-fashion-backend:latest}
    container_name: fashion-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    image: ${FRONTEND_IMAGE:-fashion-frontend:latest}
    container_name: fashion-frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started